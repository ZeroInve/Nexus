  const s = document.createElement('style');
  s.textContent = `
    .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;backdrop-filter:blur(16px)}
    .fade-in{animation:fadeIn .38s ease both}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    .slide-in{animation:slideIn .32s cubic-bezier(.16,1,.3,1) both}
    @keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:none}}
    .pulse{animation:pulseA 1.8s infinite}
    @keyframes pulseA{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
    .row-h{transition:background .12s;cursor:pointer}
    .row-h:hover{background:rgba(0,255,136,.03)!important}
    .btn{border:none;cursor:pointer;font-family:var(--cond);font-weight:600;letter-spacing:.5px;transition:all .18s}
    .btn:active{transform:scale(.95)}
    .inp{background:rgba(0,255,136,.04);border:1px solid var(--border2);border-radius:6px;color:var(--text);
      font-family:var(--mono);font-size:12px;padding:9px 12px;width:100%;outline:none;transition:border-color .2s,box-shadow .2s}
    .inp:focus{border-color:var(--em);box-shadow:0 0 0 2px var(--em-dim)}
    .inp::placeholder{color:var(--text3)}
    select.inp option{background:#0d1520}
    .chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;
      font-family:var(--cond);font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase}
    .th{font-family:var(--cond);font-size:10px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:var(--text2)}
    .rank-BUY{background:rgba(0,255,136,.12);color:var(--em);border:1px solid rgba(0,255,136,.3)}
    .rank-SELL{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,45,85,.3)}
    .rank-HOLD{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(255,184,0,.3)}
    .rank-WATCH{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(0,180,255,.3)}
    .pill-buy{background:rgba(0,255,136,.12);color:var(--em);border:1px solid rgba(0,255,136,.25);border-radius:4px;padding:2px 7px;font-family:var(--cond);font-size:10px;font-weight:700}
    .pill-sell{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,45,85,.25);border-radius:4px;padding:2px 7px;font-family:var(--cond);font-size:10px;font-weight:700}
    .pill-hold{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(255,184,0,.25);border-radius:4px;padding:2px 7px;font-family:var(--cond);font-size:10px;font-weight:700}
    .sig-bar{height:3px;border-radius:99px;background:var(--bg3);overflow:hidden}
    .sig-fill{height:100%;border-radius:99px;transition:width 1.2s cubic-bezier(.16,1,.3,1)}
    .inst-bar{height:4px;border-radius:99px;background:var(--bg3);overflow:hidden;margin-top:3px}
    .sec-hd{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:11px 16px;transition:background .12s}
    .sec-hd:hover{background:rgba(0,255,136,.03)}
    @keyframes tickerMove{from{transform:translateX(0)}to{transform:translateX(-50%)}}
    .ticker-inner{display:flex;gap:44px;animation:tickerMove 32s linear infinite;width:max-content}
    .ticker-inner:hover{animation-play-state:paused}
    .toast{position:fixed;top:76px;right:14px;z-index:2000;max-width:300px;
      background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:13px 15px;
      box-shadow:0 8px 40px rgba(0,0,0,.6);animation:toastIn .4s cubic-bezier(.16,1,.3,1) both}
    @keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:none}}
    .bottom-nav{display:none}
    .top-nav{display:flex}
    .hide-mob{display:block}
    .mob-only{display:none}
    .two-col{display:grid;grid-template-columns:330px 1fr;gap:14px}
    .agent-grid{display:grid;grid-template-columns:300px 1fr;gap:12px}
    .stats4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    .stats5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
    @media(max-width:980px){
      .two-col,.agent-grid{grid-template-columns:1fr}
      .hide-mob{display:none!important}
      .mob-only{display:block!important}
      .stats4,.stats5{grid-template-columns:repeat(2,1fr)}
    }
    @media(max-width:680px){
      .bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:500;
        background:rgba(3,5,7,.97);border-top:1px solid var(--border2);
        backdrop-filter:blur(20px);padding-bottom:env(safe-area-inset-bottom,8px);
        padding-top:6px;justify-content:space-around}
      .top-nav{display:none!important}
      .main-wrap{padding:12px 12px 90px!important}
      .hdr-inner{padding:10px 14px!important}
      .ticker-bar{display:none!important}
      .stats4,.stats5{grid-template-columns:repeat(2,1fr)}
    }
  `;
  document.head.appendChild(s);
};
injectCSS();

/* ════════════════ SIGNAL ENGINE ════════════════ */
function computeSignal(s){
  let tech=0,fund=0,sigs=[];
  if(s.rsi<30){tech+=18;sigs.push({t:"BULL",cat:"Technical",msg:`RSI ${s.rsi} — Oversold. Strong bounce potential.`});}
  else if(s.rsi<45){tech+=8;sigs.push({t:"BULL",cat:"Technical",msg:`RSI ${s.rsi} — Approaching oversold. Watch for entry.`});}
  else if(s.rsi>70){tech-=18;sigs.push({t:"BEAR",cat:"Technical",msg:`RSI ${s.rsi} — Overbought. Consider taking profit.`});}
  else if(s.rsi>60){tech+=5;sigs.push({t:"BULL",cat:"Technical",msg:`RSI ${s.rsi} — Bullish momentum building.`});}
  if(s.macd>0){tech+=12;sigs.push({t:"BULL",cat:"Technical",msg:`MACD +${f2(s.macd)} — Bullish crossover confirmed.`});}
  else{tech-=10;sigs.push({t:"BEAR",cat:"Technical",msg:`MACD ${f2(s.macd)} — Bearish. Downward momentum.`});}
  const a50=s.price>s.ma50,a200=s.price>s.ma200;
  if(a50&&a200){tech+=14;sigs.push({t:"BULL",cat:"Technical",msg:`Above 50MA & 200MA. Strong uptrend confirmed.`});}
  else if(!a50&&!a200){tech-=14;sigs.push({t:"BEAR",cat:"Technical",msg:`Below 50MA & 200MA. Downtrend confirmed.`});}
  else if(a50){tech+=6;sigs.push({t:"BULL",cat:"Technical",msg:`Above 50MA — short-term bullish.`});}
  else{tech-=6;sigs.push({t:"BEAR",cat:"Technical",msg:`Below 50MA — short-term bearish.`});}
  const vr=s.vol/s.avgVol;
  if(vr>1.5){tech+=6;sigs.push({t:"BULL",cat:"Technical",msg:`Volume ${f1(vr)}x avg — Strong conviction behind move.`});}
  const chgPct=((s.price-s.prev)/s.prev)*100;
  if(chgPct>1.5)tech+=5; else if(chgPct<-1.5)tech-=5;
  if(s.pe){
    if(s.pe<12){fund+=15;sigs.push({t:"BULL",cat:"Fundamental",msg:`PE ${s.pe}x — Undervalued. Strong value opportunity.`});}
    else if(s.pe<20){fund+=8;sigs.push({t:"BULL",cat:"Fundamental",msg:`PE ${s.pe}x — Fairly valued. Reasonable entry.`});}
    else if(s.pe>50){fund-=10;sigs.push({t:"BEAR",cat:"Fundamental",msg:`PE ${s.pe}x — Expensive. Priced for perfection.`});}
    else if(s.pe>30)fund-=4;
  }else{fund-=8;sigs.push({t:"BEAR",cat:"Fundamental",msg:`No positive earnings — not yet profitable.`});}
  if(s.divYield>5){fund+=12;sigs.push({t:"BULL",cat:"Fundamental",msg:`Div yield ${s.divYield}% — High income. Defensive holding.`});}
  else if(s.divYield>3){fund+=6;sigs.push({t:"BULL",cat:"Fundamental",msg:`Div yield ${s.divYield}% — Healthy income stream.`});}
  if(s.roe>20){fund+=10;sigs.push({t:"BULL",cat:"Fundamental",msg:`ROE ${s.roe}% — Excellent capital efficiency.`});}
  else if(s.roe>10){fund+=5;sigs.push({t:"BULL",cat:"Fundamental",msg:`ROE ${s.roe}% — Good returns on equity.`});}
  else if(s.roe<0){fund-=12;sigs.push({t:"BEAR",cat:"Fundamental",msg:`ROE ${s.roe}% — Loss-making.`});}
  if(s.pbv<1){fund+=8;sigs.push({t:"BULL",cat:"Fundamental",msg:`P/BV ${s.pbv}x — Below book value. Deep value.`});}
  else if(s.pbv<2)fund+=4;
  if(s.debtEq<0.3)fund+=5; else if(s.debtEq>1.5){fund-=5;sigs.push({t:"BEAR",cat:"Fundamental",msg:`Debt/Equity ${s.debtEq}x — High leverage risk.`});}
  const total=Math.max(-100,Math.min(100,tech+fund));
  const tN=Math.max(0,Math.min(100,50+tech));
  const fN=Math.max(0,Math.min(100,50+fund));
  let rank,conf;
  if(total>=35){rank="BUY";conf=Math.min(95,60+total);}
  else if(total>=10){rank="WATCH";conf=Math.min(80,50+total);}
  else if(total<=-25){rank="SELL";conf=Math.min(90,60+Math.abs(total));}
  else{rank="HOLD";conf=Math.min(75,50+Math.abs(total));}
  const entry=parseFloat((rank==="BUY"||rank==="WATCH"?s.price*.995:s.price*1.005).toFixed(s.price>10?2:3));
  const sl=parseFloat((rank==="BUY"||rank==="WATCH"?s.price*.94:s.price*1.06).toFixed(s.price>10?2:3));
  const tp1=parseFloat((rank==="BUY"||rank==="WATCH"?s.price*1.08:s.price*.92).toFixed(s.price>10?2:3));
  const tp2=parseFloat((rank==="BUY"||rank==="WATCH"?s.price*1.18:s.price*.85).toFixed(s.price>10?2:3));
  const rr=parseFloat((Math.abs(tp1-entry)/Math.abs(entry-sl)).toFixed(2));
  return{rank,conf:Math.round(conf),total,tN,fN,sigs,entry,sl,tp1,tp2,rr,chgPct};
}

      React.createElement('div',{style:{position:"absolute",top:-300,left:-200,width:800,height:800,borderRadius:"50%",background:"radial-gradient(circle,rgba(0,255,136,.03) 0%,transparent 60%)"}}),
      React.createElement('div',{style:{position:"absolute",bottom:-200,right:-100,width:600,height:600,borderRadius:"50%",background:"radial-gradient(circle,rgba(0,180,255,.02) 0%,transparent 60%)"}}),
      React.createElement('div',{style:{position:"absolute",inset:0,backgroundImage:"linear-gradient(rgba(0,255,136,.012) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,.012) 1px,transparent 1px)",backgroundSize:"60px 60px"}})
    ),

    React.createElement('div',{style:{position:"relative",zIndex:1,minHeight:"100vh",display:"flex",flexDirection:"column"}},

      /* HEADER */
      React.createElement('header',{style:{background:"rgba(3,5,7,.96)",borderBottom:"1px solid var(--border2)",backdropFilter:"blur(20px)",position:"sticky",top:0,zIndex:100,flexShrink:0}},
        React.createElement('div',{className:"hdr-inner",style:{maxWidth:1400,margin:"0 auto",padding:"11px 22px",display:"flex",alignItems:"center",gap:14}},
          /* Logo */
          React.createElement('div',{style:{display:"flex",alignItems:"center",gap:9,flexShrink:0}},
            React.createElement('div',{style:{width:32,height:32,borderRadius:8,background:"linear-gradient(135deg,#00ff88,#00b4ff)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,boxShadow:"0 0 18px rgba(0,255,136,.35)"}},"📊"),
            React.createElement('div',null,
              React.createElement('div',{style:{fontFamily:"var(--cond)",fontWeight:800,fontSize:18,letterSpacing:2,color:"var(--em)",textShadow:"0 0 18px var(--em-glow)"}},"NEXUS"),
              React.createElement('div',{style:{fontFamily:"var(--cond)",fontSize:8,color:"var(--text2)",letterSpacing:2}},"INVESTMENT INTELLIGENCE")
            )
          ),
          /* Desktop nav */
          React.createElement('nav',{className:"top-nav",style:{gap:2,background:"rgba(13,20,32,.8)",borderRadius:8,padding:3,marginLeft:10,border:"1px solid var(--border)",flexWrap:"wrap"}},
            TABS.map(t=>React.createElement('button',{key:t.id,className:"btn",onClick:()=>setTab(t.id),style:{padding:"6px 13px",borderRadius:6,fontSize:11,letterSpacing:.5,background:tab===t.id?"var(--em)":"transparent",color:tab===t.id?"#000":"var(--text2)",border:"none",fontFamily:"var(--cond)",fontWeight:700}},t.icon," ",t.label))
          ),
          /* Status */
          React.createElement('div',{style:{marginLeft:"auto",display:"flex",gap:12,alignItems:"center",flexShrink:0}},
            [["KLSE",klseOpen],["US",usOpen]].map(([l,open])=>
              React.createElement('div',{key:l,style:{display:"flex",alignItems:"center",gap:4}},
                React.createElement('div',{className:"pulse",style:{width:5,height:5,borderRadius:"50%",background:open?"var(--em)":"var(--red)"}}),
                React.createElement('span',{style:{fontFamily:"var(--cond)",fontSize:9,color:"var(--text2)",letterSpacing:1,fontWeight:700}},l," ",open?"LIVE":"CLOSED")
              )
            ),
            React.createElement('div',{style:{fontFamily:"var(--mono)",fontSize:10,color:"var(--text2)"}},tick.toLocaleTimeString("en-MY",{hour12:false}))
          )
        ),
        /* Summary bar */
        React.createElement('div',{style:{background:"rgba(3,5,7,.8)",borderTop:"1px solid var(--border)"}},
          React.createElement('div',{style:{maxWidth:1400,margin:"0 auto",padding:"8px 22px",display:"flex",gap:20,alignItems:"center",overflowX:"auto",scrollbarWidth:"none"}},
            [
              {l:"Total Portfolio",v:"RM "+f2(totalMyr),c:"var(--text)"},
              {l:"Unrealised P&L",v:(totalGain>=0?"+":"")+"RM "+f2(totalGain)+" ("+(totalGain>=0?"+":"")+f1((totalGain/totalCost)*100)+"%)",c:totalGain>=0?"var(--em)":"var(--red)"},
              {l:"KLSE (RHB)",v:"RM "+f2(klseVal),c:"var(--blue)"},
              {l:"US (Moomoo)",v:"$ "+f2(usVal),c:"var(--purple)"},
              {l:"Signals Today",v:STOCKS.filter(s=>computeSignal(s).rank==="BUY").length+" BUY  "+STOCKS.filter(s=>computeSignal(s).rank==="SELL").length+" SELL",c:"var(--gold)"},
            ].map(({l,v,c})=>React.createElement('div',{key:l,style:{flexShrink:0}},
              React.createElement('div',{style:{fontFamily:"var(--cond)",fontSize:8,color:"var(--text3)",letterSpacing:1.5,textTransform:"uppercase",fontWeight:700,marginBottom:1}},l),
              React.createElement('div',{style:{fontFamily:"var(--mono)",fontSize:12,fontWeight:700,color:c,whiteSpace:"nowrap"}},v)
            ))
          )
        )
      ),

      /* MAIN */
      React.createElement('main',{className:"main-wrap",style:{maxWidth:1400,margin:"0 auto",width:"100%",padding:"18px 22px",flex:1}},
        renderTab()
      ),

      /* MOBILE NAV */
      React.createElement('nav',{className:"bottom-nav"},
        TABS.map(t=>React.createElement('button',{key:t.id,className:"btn",onClick:()=>setTab(t.id),style:{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 0",flex:1,background:"transparent",border:"none",color:tab===t.id?"var(--em)":"var(--text2)"}},
          React.createElement('span',{style:{fontSize:18}},t.icon),
          React.createElement('span',{style:{fontFamily:"var(--cond)",fontSize:8,fontWeight:700,letterSpacing:.5,textTransform:"uppercase"}},t.short),
          tab===t.id&&React.createElement('div',{style:{width:16,height:2,background:"var(--em)",borderRadius:99}})
        ))
      )
    ),

    /* TOASTS */
    React.createElement('div',{style:{position:"fixed",top:76,right:14,zIndex:2000,display:"flex",flexDirection:"column",gap:8}},
      toasts.map(t=>React.createElement(Toast,{key:t.id,t}))
    )
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
